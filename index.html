<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/><meta name="theme-color" content="#17213a"/><title>Anki Adventure</title></head><body><main id="app"><header><strong>ANKI ADVENTURE</strong><span id="deck-status">Loading local journal…</span><button id="menu-button" aria-label="Open menu">☰</button></header><section id="game-shell"><div id="game"></div><div id="battle" hidden></div></section><nav id="controls" aria-label="Movement controls"><div class="dpad"><button data-move="0,-1">▲</button><button data-move="-1,0">◀</button><button data-move="0,1">▼</button><button data-move="1,0">▶</button></div><button id="action-button" class="round">A<br/><small>CHECK</small></button></nav><dialog id="menu"><form method="dialog"><h2>ADVENTURER'S PACK</h2><p id="party-summary"></p><label class="file">Import deck (.apkg / .csv)<input id="deck-input" type="file" accept=".apkg,.csv"/></label><label>Daily new cards <input id="new-limit" type="number" min="0" max="999" value="10"/></label><button id="save-limit" value="none">Save setting</button><button id="export-backup" value="none">Export backup</button><label class="file">Restore backup<input id="restore-input" type="file" accept="application/json"/></label><p class="hint">Safari tip: use Share → Add to Home Screen. The local deck remains on this device; export backups regularly.</p><button>Close</button></form></dialog></main><script type="module" src="/src/main.ts"></script></body></html>
